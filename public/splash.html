<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PostPro Suite</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #080b14;
    width: 100vw; height: 100vh;
    overflow: hidden;
    font-family: 'Montserrat', sans-serif;
    display: flex; align-items: center; justify-content: center;
  }

  /* ── GRAIN OVERLAY ── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.035;
    pointer-events: none;
  }

  /* ── SCANLINES ── */
  body::after {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px, transparent 2px,
      rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
  }

  /* ── CENTER STAGE ── */
  .stage {
    position: relative; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; gap: 0;
    opacity: 0;
    animation: stageIn 0.6s ease 0.2s forwards;
  }

  @keyframes stageIn {
    to { opacity: 1; }
  }

  /* ── CAMERA ICON ── */
  .icon-wrap {
    position: relative;
    width: 160px; height: 160px;
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transform: scale(0.88);
    animation: iconIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.5s forwards;
  }

  @keyframes iconIn {
    to { opacity: 1; transform: scale(1); }
  }

  .icon-glow {
    position: absolute; inset: -30px;
    background: radial-gradient(circle, rgba(58,119,168,0.35) 0%, transparent 70%);
    animation: glowPulse 2.5s ease 1.4s infinite;
    border-radius: 50%;
  }

  @keyframes glowPulse {
    0%, 100% { opacity: 0.7; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.12); }
  }

  .icon-wrap svg { position: relative; z-index: 1; }

  /* ── LUQOM WORDMARK ── */
  .wordmark {
    margin-top: 28px;
    overflow: hidden;
    opacity: 0;
    transform: translateY(16px);
    letter-spacing: 0.55em;
    animation: wordIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) 1.3s forwards;
  }

  @keyframes wordIn {
    to { opacity: 1; transform: translateY(0); }
  }

  .wordmark svg {
    height: 22px;
    width: auto;
    display: block;
  }

  /* ── DIVIDER ── */
  .divider {
    width: 0px;
    height: 1px;
    background: rgba(255,255,255,0.15);
    margin-top: 20px;
    animation: divExpand 0.6s ease 2s forwards;
  }

  @keyframes divExpand {
    to { width: 220px; }
  }

  /* ── SUBTITLE ── */
  .subtitle {
    margin-top: 16px;
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    opacity: 0;
    animation: fadeUp 0.6s ease 2.1s forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── VERSION ── */
  .version {
    position: fixed; bottom: 28px; right: 32px;
    font-size: 9px;
    font-weight: 400;
    letter-spacing: 0.18em;
    color: rgba(255,255,255,0.12);
    opacity: 0;
    animation: fadeUp 0.5s ease 2.4s forwards;
    font-variant-numeric: tabular-nums;
  }

  /* ── LOADING BAR ── */
  .progress-track {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 2px;
    background: rgba(255,255,255,0.04);
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, transparent, rgba(58,119,168,0.8), rgba(100,180,255,0.9), rgba(58,119,168,0.8));
    animation: barFill 2.4s cubic-bezier(0.4, 0, 0.2, 1) 0.8s forwards;
  }

  @keyframes barFill {
    0% { width: 0%; }
    60% { width: 75%; }
    85% { width: 90%; }
    100% { width: 100%; }
  }

  /* ── SHUTTER IRIS EXIT ── */
  .iris-overlay {
    position: fixed; inset: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
    opacity: 0;
    background: #080b14;
    transition: opacity 0.5s ease;
  }

  .iris-overlay.closing {
    opacity: 1;
  }

  /* ── EXIT ── */
  .stage.exit {
    animation: stageOut 0.5s ease forwards;
  }

  @keyframes stageOut {
    to { opacity: 0; transform: translateY(-12px); filter: blur(4px); }
  }
</style>
</head>
<body>

<div class="stage" id="stage">

  <!-- Camera Icon with glow -->
  <div class="icon-wrap">
    <div class="icon-glow"></div>
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="140" height="140">
      <path fill="#ffffff" d="M176.6,108.4c-13.9-7.4-29.9-8.9-44.9-4.3-4.1,1.3-8.1,3-11.8,5.1l74.7,88.5c12.3-15.2,16.4-35.7,10.7-54.4-4.6-15.1-14.8-27.4-28.7-34.8Z"/>
      <path fill="#ffffff" d="M265.8,59c0-3.2-2.6-5.8-5.8-5.8h-28.2c-3.2,0-5.8,2.6-5.8,5.8v6h39.8v-6Z"/>

    </svg>
  </div>

  <!-- LUQOM wordmark via SVG -->
  <div class="wordmark">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="340 30 700 140" height="24">
      <path fill="#ffffff" d="M352.3,36.7h14.7v113.1h73.1v13.5h-87.7V36.7ZM454.8,110.2V36.7h14.7v72.6c0,28,14.8,43,39.7,43s39.1-13.7,39.1-42V36.7h14.7v72.4c0,37.8-21.7,56.9-54.2,56.9s-54-19.1-54-55.8ZM715.7,80.8c-5.1-16.9-16.5-30.7-32.1-39c-15.6-8.3-33.4-10-50.3-4.9-7.6,2.3-14.6,5.9-20.9,10.7l-5.5,4.7,76,90.1c-4.6,3.3-9.7,5.8-15.2,7.5-13.3,4.1-27.4,2.7-39.8-3.9-12.3-6.6-21.4-17.5-25.4-30.8-3.6-11.6-2.8-24.1,1.9-35.4l-9.7-11.5c-8.5,15.5-10.4,34.1-5.3,50.9,10.6,34.8,47.6,54.4,82.4,43.8,7.3-2.2,14-5.6,20.1-10.1l16,18.9,10.5-8.9-16.3-19.4c15-17.1,20.3-41,13.6-62.9ZM626.9,54.6c3.3-1.9,6.8-3.4,10.5-4.5,13.3-4.1,27.5-2.7,39.8,3.8,12.3,6.6,21.3,17.5,25.4,30.8,5,16.5,1.4,34.7-9.4,48.2l-66.2-78.4ZM873.1,100c0,36.4-29.5,66-66,66s-66-29.5-66-66,29.5-66,66-66,66,29.5,66,66ZM807.1,47.8c-28.8,0-52.2,23.4-52.2,52.2s23.4,52.2,52.2,52.2,52.2-23.4,52.2-52.2-23.4-52.2-52.2-52.2ZM1005.1,36.7l-47.3,70.8-47.3-70.8h-14.8v126.6h14.7V61.4l47.3,69.5h.4l47.3-69.5v102h14.7V36.7h-14.8Z"/>
    </svg>
  </div>

  <!-- Divider -->
  <div class="divider"></div>

  <!-- Subtitle -->
  <div class="subtitle">PostPro Suite &nbsp;·&nbsp; Image Workflow</div>

</div>

<!-- Version -->
<div class="version">v1.0.8</div>

<!-- Progress bar -->
<div class="progress-track">
  <div class="progress-fill"></div>
</div>

<!-- Black iris for exit -->
<div class="iris-overlay" id="iris"></div>

<script>
  let setupStatus = null;

  // Workspace-Check parallel zur Animation
  fetch('/api/workspace-status')
    .then(r => r.json())
    .then(data => { setupStatus = data; })
    .catch(() => { setupStatus = { status: 'ok' }; });

  setTimeout(() => {
    const stage   = document.getElementById('stage');
    const iris    = document.getElementById('iris');
    const sub     = document.querySelector('.subtitle');

    // Workspace-Status anzeigen falls Erststart
    if (setupStatus && setupStatus.firstRun) {
      sub.textContent = '✓ Workspace wird eingerichtet …';
      sub.style.color = 'rgba(48,209,88,0.7)';
    }

    setTimeout(() => {
      stage.classList.add('exit');
      setTimeout(() => {
        iris.classList.add('closing');
        setTimeout(() => { window.location.href = '/'; }, 520);
      }, 300);
    }, setupStatus && setupStatus.firstRun ? 900 : 200);

  }, 3600);
</script>
</body>
</html>
