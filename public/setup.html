<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PostPro Suite - Einrichtung</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .setup-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 60px 40px;
            text-align: center;
        }

        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        h1 {
            font-size: 28px;
            color: #1a1a1a;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .subtitle {
            font-size: 14px;
            color: #666;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 30px;
        }

        label {
            display: block;
            font-size: 14px;
            color: #333;
            margin-bottom: 12px;
            font-weight: 500;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        input::placeholder {
            color: #999;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: none;
            margin-right: 8px;
        }

        .error {
            color: #dc3545;
            font-size: 13px;
            margin-top: 8px;
            display: none;
            text-align: left;
        }

        .success {
            color: #28a745;
            font-size: 13px;
            margin-top: 8px;
            display: none;
            text-align: left;
        }

        .info-box {
            background: #f5f7ff;
            border-left: 4px solid #667eea;
            padding: 16px;
            margin: 30px 0;
            border-radius: 4px;
            text-align: left;
            font-size: 13px;
            color: #555;
            line-height: 1.6;
        }

        .info-box strong {
            display: block;
            color: #333;
            margin-bottom: 5px;
        }

        @media (max-width: 480px) {
            .setup-container {
                padding: 40px 25px;
            }

            h1 {
                font-size: 24px;
            }

            label, input, button {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="setup-container">
        <div class="logo">🎬</div>
        <h1>Willkommen zu PostPro Suite!</h1>
        <div class="subtitle">
            Lass dich bitte kurz einrichten, damit wir deine Workflows personalisieren können.
        </div>

        <form id="setupForm">
            <div class="form-group">
                <label for="userName">Dein Name</label>
                <input
                    type="text"
                    id="userName"
                    name="userName"
                    placeholder="z.B. Julian, Boris, Sven"
                    autocomplete="off"
                    required
                >
                <div class="error" id="error"></div>
                <div class="success" id="success"></div>
            </div>

            <div class="info-box">
                <strong>Warum fragen wir dich?</strong>
                Dein Name wird verwendet, um deine Workflows und Logs richtig zuzuordnen. So wissen wir später, wer was bearbeitet hat.
            </div>

            <button type="submit" id="submitBtn">
                <span class="loading" id="loading">⏳</span>
                Fortfahren
            </button>
        </form>
    </div>

    <script>
        const form = document.getElementById('setupForm');
        const userNameInput = document.getElementById('userName');
        const submitBtn = document.getElementById('submitBtn');
        const errorDiv = document.getElementById('error');
        const successDiv = document.getElementById('success');
        const loadingSpan = document.getElementById('loading');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const userName = userNameInput.value.trim();

            if (!userName) {
                showError('Bitte gib deinen Namen ein');
                return;
            }

            submitBtn.disabled = true;
            loadingSpan.style.display = 'inline';
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            try {
                const response = await fetch('/api/setup-user', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ userName })
                });

                if (!response.ok) {
                    const data = await response.json();
                    throw new Error(data.error || 'Fehler beim Speichern');
                }

                showSuccess('Perfekt! Du wirst jetzt eingerichtet...');

                // Wait 1 second, then redirect to splash
                setTimeout(() => {
                    window.location.href = '/splash';
                }, 1000);

            } catch (err) {
                console.error('Setup error:', err);
                showError(err.message || 'Ein Fehler ist aufgetreten');
                submitBtn.disabled = false;
                loadingSpan.style.display = 'none';
            }
        });

        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            successDiv.style.display = 'none';
        }

        function showSuccess(message) {
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            errorDiv.style.display = 'none';
        }

        // Focus input on load
        userNameInput.focus();
    </script>
</body>
</html>
